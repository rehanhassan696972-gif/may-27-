<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wait, I'm Sorry! 🥺</title>
    <style>
        /* 1. SHARED BACKGROUND */
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: 
                linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4)),
                linear-gradient(135deg, #fef7d8 0%, #faeef8 100%),
                repeating-linear-gradient(0deg, rgba(162, 162, 162, 0.05) 0px, rgba(162, 162, 162, 0.05) 1px, transparent 1px, transparent 20px),
                repeating-linear-gradient(90deg, rgba(162, 162, 162, 0.05) 0px, rgba(162, 162, 162, 0.05) 1px, transparent 1px, transparent 20px);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* 2. BOUNCY CARD */
        @keyframes elasticPop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .container { 
            text-align: center; 
            width: 90%; 
            max-width: 380px; 
            z-index: 10; 
        }

        .apology-card {
            background-color: #fefdf3;
            padding: 35px 20px;
            border-radius: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            animation: elasticPop 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            position: relative;
        }

        .sorry-cat {
            width: 80%;
            max-width: 200px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        h1 { color: #d159a6; font-size: 1.6rem; margin-bottom: 10px; }
        h2 { color: #333; font-size: 1.3rem; margin: 20px 0 10px 0; }

        .apology-text {
            color: #8a6375;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        /* 3. BUTTON CONTROLS */
        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            min-height: 100px; /* Space for the growing button */
        }

        .yes-btn {
            background-color: #27c93f;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
            z-index: 100;
        }

        .no-btn {
            background-color: #ff4d4d;
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        /* 4. MOBILE QUERY */
        @media (max-width: 480px) {
            .container { max-width: 320px; }
            h1 { font-size: 1.4rem; }
            .apology-text { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="apology-card">
            <img src="cat.jpeg" alt="I'm Sorry" class="sorry-cat">

            <h1>SORRY for the tickets!!</h1>
            
            <p class="apology-text">
                The tickets part was just a fun surprise, and I hope it made you smile. I know how much you wanted to go to Seoul.
                <br><br>
                Even if I can't fly you to Seoul, I hope this work made you smile.
            </p>

            <h2>SO U FORGIVE ME?</h2>

            <div class="btn-wrapper">
                <button class="yes-btn" id="yesBtn" onclick="celebrate()">HA, IT'S OKAY</button>
                <button class="no-btn" id="noBtn" onmouseover="dodge()" onclick="dodge()">Nah</button>
            </div>
        </div>
    </div>

    <script>
        let yesScale = 1;
        let noScale = 1;

        function dodge() {
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');

            // 1. Make Yes Button Larger
            yesScale += 0.35;
            yesBtn.style.transform = `scale(${yesScale})`;

            // 2. Make No Button Smaller
            noScale -= 0.15;
            if (noScale < 0.4) noScale = 0.4; // Don't let it vanish
            noBtn.style.transform = `scale(${noScale})`;

            // 3. Move No Button to a random spot
            // We keep it within the card for better mobile experience
            const randomX = Math.floor(Math.random() * 150) - 75; 
            const randomY = Math.floor(Math.random() * 150) - 75;
            
            noBtn.style.position = "absolute";
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }
        function celebrate() {
    window.location.href = 'playlist 8.html';
}

        
    </script>
</body>
</html>
