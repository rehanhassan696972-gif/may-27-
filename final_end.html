<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Letter Sealed 💜</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fef7d8 0%, #faeef8 100%);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        .title { color: #d159a6; font-size: 1.5rem; font-weight: 800; margin-bottom: 5px; opacity: 0.6; }
        .subtitle { color: #a67bb1; font-size: 0.85rem; margin-bottom: 25px; opacity: 0.6; }

        /* Main Success Card */
        .success-card {
            background: #fffdf2;
            border-radius: 30px;
            padding: 40px 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            border: 12px solid #faeef8;
            position: relative;
            animation: finalReveal 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes finalReveal {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* The Heart Circle */
        .heart-circle {
            width: 100px;
            height: 100px;
            background-color: #fecfef;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            font-size: 50px;
        }

        h1 {
            color: #f241a0;
            font-size: 1.8rem;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        .message { color: #a67bb1; font-size: 1.1rem; margin-bottom: 20px; }

        .heart-row {
            color: #ff9a9e;
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 25px;
        }

        .forever-text {
            color: #d159a6;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .date-text {
            color: #a67bb1;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Buttons */
        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn {
            width: 90%;
            padding: 16px;
            border-radius: 40px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-magic {
            background-color: #f241a0;
            color: white;
            box-shadow: 0 8px 20px rgba(242, 65, 160, 0.3);
        }

        .btn-kisses {
            background-color: #98e4c1;
            color: #2d5a44;
            box-shadow: 0 8px 20px rgba(152, 228, 193, 0.3);
        }

        .btn:hover { transform: translateY(-3px); }

        /* Tiny corner heart */
        .corner-heart { position: absolute; bottom: 15px; left: 15px; font-size: 1rem; }
        
       /* The Spring Pop Animation */
@keyframes stickerPop {
    0% {
        opacity: 0;
        transform: scale(0) rotate(-10deg); /* Starts tiny and slightly tilted */
    }
    70% {
        transform: scale(1.1) rotate(5deg); /* Overshoots size for the "pop" */
    }
    100% {
        opacity: 1;
        transform: scale(1) rotate(0deg); /* Settles at perfect size */
    }
}

.cat-mini {
    position: absolute;
    top: -25px;
    right: -10px;
    width: 75px;
    z-index: 10;
    
    /* APPLYING THE EFFECT */
    opacity: 0; /* Hidden before animation starts */
    animation: stickerPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    animation-delay: 0.5s; /* Wait a half-second so the card appears first */
}
        
    </style>
</head>
<body>

<div class="container">
    <div class="title">Final Birthday Letter</div>
    <div class="subtitle">A special message sealed with love 💕</div>

    <div class="success-card">
        <img src="finalcat.png" alt="cat" class="cat-mini">

        <div class="heart-circle">💝</div>

        <h1>Birthday Letter Sealed with Love</h1>
        <p class="message">Happy Birthday, AYESHA!</p>

        <div class="heart-row">♡ ♡ ♡ ♡ ♡ ♡</div>

        <div class="forever-text"> Happy Birthday!</div>
        <div class="date-text">💕 🎂 <br> Wednesday, May 27, 2026</div>

        <div class="btn-stack">
            <button class="btn btn-magic" onclick="window.location.href='index.html'">
                Experience Birthday Magic Again
                <span style="font-size: 0.8rem;">✨</span>
            </button>
            
        </div>

        <div class="corner-heart">💖</div>
    </div>
</div>
 <audio id="backgroundMusic" loop>
    <source src="bg.mp3" type="audio/mpeg">
</audio>
<script>
    window.addEventListener('load', function() {
        const audio = document.getElementById('backgroundMusic');
        
        // 1. Try to play immediately on load
        const playPromise = audio.play();

        if (playPromise !== undefined) {
            playPromise.catch(error => {
                // 2. If browser blocks autoplay, wait for the first touch/click
                console.log("Autoplay blocked. Waiting for user interaction...");
                
                const startOnInteraction = () => {
                    audio.play();
                    // Remove listeners after first successful play
                    document.removeEventListener('click', startOnInteraction);
                    document.removeEventListener('touchstart', startOnInteraction);
                };

                document.addEventListener('click', startOnInteraction);
                document.addEventListener('touchstart', startOnInteraction);
            });
        }
    });
</script>


</body>
</html>
