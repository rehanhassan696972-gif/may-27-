<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V's Birthday Special 💜</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fef7d8 0%, #faeef8 100%);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        .container { width: 100%; max-width: 420px; text-align: center; }
        h2 { color: #d159a6; margin-bottom: 5px; font-weight: 800; font-size: 1.2rem; }
        h3 { color: #a67bb1; font-size: 0.8rem; margin-bottom: 15px; font-weight: normal; }

        .white-card {
            background: white;
            border-radius: 30px;
            padding: 15px 5px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            margin: 0 auto 15px auto;
            width: 92%;
            position: relative;
        }

        .swiper { width: 100%; padding-top: 50px; padding-bottom: 20px; }

        .swiper-slide {
            opacity: 0.3;
            transition: all 0.5s ease;
            transform: scale(0.8);
            perspective: 1200px;
        }

        .swiper-slide-active { opacity: 1 !important; transform: scale(1) !important; z-index: 100 !important; }

        .flip-card-inner {
            position: relative;
            width: 250px;
            margin: 0 auto;
            aspect-ratio: 3/4;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .swiper-slide.is-flipped .flip-card-inner { transform: rotateY(180deg) scale(0.9); }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
        }

        .flip-card-front img { 
            width: 100%; height: 100%; object-fit: cover; border-radius: 20px;
            filter: grayscale(100%) brightness(0.9);
            transition: filter 0.5s ease;
        }

        .flip-card-back {
            background: #000000; color: white; transform: rotateY(180deg);
            display: flex; justify-content: center; align-items: center;
            padding: 25px; text-align: center; border-radius: 20px;
            font-size: 0.95rem; border: 1.5px solid #f241a0;
            line-height: 1.5;
            font-family: sans-serif;
        }

        .progress-bar-container {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin: 15px auto;
            width: 85%;
        }

        .progress-segment {
            flex: 1;
            height: 5px;
            background: #e0e0e0;
            border-radius: 10px;
            transition: all 0.4s ease;
        }

        .progress-segment.filled {
            background: #f241a0;
            box-shadow: 0 0 10px rgba(242, 65, 160, 0.4);
        }

        #final-letter-btn {
            background-color: #f241a0;
            color: white;
            padding: 16px 0;
            border-radius: 40px;
            font-weight: bold;
            border: none;
            width: 85%;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(242, 65, 160, 0.2);
            display: none; 
            transition: 0.3s;
            margin-top: 10px;
        }

        .swiper-button-next, .swiper-button-prev { color: #f241a0 !important; background: white; width: 35px !important; height: 35px !important; border-radius: 50%; top: 58% !important; z-index: 10 !important; }
        .swiper-button-next:after, .swiper-button-prev:after { font-size: 14px !important; }
        .swiper-pagination-fraction { top: 15px !important; right: 15px !important; background: #f241a0; color: white; border-radius: 20px; width: 50px !important; height: 25px !important; line-height: 25px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Some important messages for you 💜</h2>
    <h3>Click the image to flip and reveal the message ☺️</h3>

    <div class="white-card">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <script>
                    const deepLines = [
                        "~~May this year be the one where your biggest dreams finally stop being 'plans' and start becoming your reality.💞",
                        "~~Wishing you a day as bright as your smile and a year as beautiful as your heart.💞",
                        "~~I hope this new age brings you closer to everything that makes you feel alive and at peace.💞",
                        "~~May your year be filled with 'good news' only—the kind of joy that makes you forget all your worries.💞",
                        "~~Happy Birthday to the girl who is a rare mix of pure chaos and absolute grace. Don’t ever change.💞",
                        "~~You’ve been the best part of my year; I hope I can make this birthday the best part of yours.💞",
                        "~~May you always have the strength to chase your goals and the wisdom to know how incredibly capable you are.💞",
                        "~~The world is a little bit brighter just because you’re in it. Keep shining, Birthday Queen.💞",
                        "~~Here’s to another year of making memories, laughing until it hurts, and growing together.💞",
                        "~~Whatever you’re wishing for today, I’m wishing for it too. You deserve the entire world.💞"
                    ];

                    for(let i=1; i<=10; i++) {
                        document.write(`
                            <div class="swiper-slide" data-id="${i-1}">
                                <div class="flip-card-inner">
                                    <div class="flip-card-front"><img src="bts${i}.jpg"></div>
                                    <div class="flip-card-back">
                                        <p>${deepLines[i-1]}</p>
                                    </div>
                                </div>
                            </div>
                        `);
                    }
                </script>
            </div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>

        <div class="progress-bar-container">
            <div class="progress-segment" id="seg-0"></div>
            <div class="progress-segment" id="seg-1"></div>
            <div class="progress-segment" id="seg-2"></div>
            <div class="progress-segment" id="seg-3"></div>
            <div class="progress-segment" id="seg-4"></div>
            <div class="progress-segment" id="seg-5"></div>
            <div class="progress-segment" id="seg-6"></div>
            <div class="progress-segment" id="seg-7"></div>
            <div class="progress-segment" id="seg-8"></div>
            <div class="progress-segment" id="seg-9"></div>
        </div>
    </div>

    <button id="final-letter-btn" onclick="window.location.href='final.html'">
        READ FINAL LETTER ✨
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const flippedSet = new Set();

    const swiper = new Swiper(".mySwiper", {
        effect: "coverflow",
        centeredSlides: true,
        slidesPerView: "auto",
        loop: false,
        coverflowEffect: { rotate: 0, stretch: 20, depth: 150, modifier: 1.5, slideShadows: false },
        pagination: { el: ".swiper-pagination", type: "fraction" },
        navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
    });

    document.querySelectorAll('.swiper-slide').forEach(slide => {
        slide.addEventListener('click', function() {
            // Only allow flip if the slide is the active (center) one
            if (this.classList.contains('swiper-slide-active')) {
                const wasAlreadyFlipped = this.classList.contains('is-flipped');
                this.classList.toggle('is-flipped');

                if (!wasAlreadyFlipped) {
                    const slideIndex = this.getAttribute('data-id');
                    flippedSet.add(slideIndex);
                    
                    // Mark the progress segment
                    const segment = document.getElementById(`seg-${slideIndex}`);
                    if(segment) segment.classList.add('filled');

                    // Check if all 10 unique cards have been flipped
                    if (flippedSet.size === 10) {
                        document.getElementById('final-letter-btn').style.display = 'inline-block';
                    }
                }
            }
        });
    });

    // Automatically flip back when moving to a new slide for a better UI
    swiper.on('slideChange', () => {
        document.querySelectorAll('.swiper-slide').forEach(s => s.classList.remove('is-flipped'));
    });

    // Music Autoplay Logic
    window.addEventListener('load', function() {
        const audio = document.getElementById('backgroundMusic');
        const playPromise = audio.play();

        if (playPromise !== undefined) {
            playPromise.catch(() => {
                const startOnInteraction = () => {
                    audio.play();
                    document.removeEventListener('click', startOnInteraction);
                    document.removeEventListener('touchstart', startOnInteraction);
                };
                document.addEventListener('click', startOnInteraction);
                document.addEventListener('touchstart', startOnInteraction);
            });
        }
    });
</script>

<audio id="backgroundMusic" loop>
    <source src="bg.mp3" type="audio/mpeg">
</audio>

</body>
</html>
